name: Portfolio Alerts

on:
  schedule:
    # Times are UTC. IST = UTC+5:30. Market hours: 09:15-15:30 IST Mon-Fri.
    - cron: "45 3,4,5,6,7,8,9 * * 1-5"   # states: hourly-ish during market hours
    - cron: "15 5,9 * * 1-5"              # filings: twice on trading days
    - cron: "30 3 * * 1"                  # calendar: Monday morning IST
    - cron: "30 4 * * 0"                  # digest: Sunday 10:00 IST
    - cron: "30 14 * * 1-5"               # bhavcopy: 20:00 IST, after NSE/BSE publish EOD files
  workflow_dispatch:                       # manual run button
    inputs:
      run_backfill:
        description: "Also run the one-time bhavcopy backfill (~2yr history)?"
        type: boolean
        default: false

jobs:
  states:
    if: github.event.schedule == '45 3,4,5,6,7,8,9 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py states
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  filings:
    if: github.event.schedule == '15 5,9 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py filings
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  calendar:
    if: github.event.schedule == '30 3 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py calendar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  digest:
    if: github.event.schedule == '30 4 * * 0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAILS: ${{ secrets.DIGEST_EMAILS }}

  bhavcopy:
    # Daily EOD price pull for the 6 SME/Emerge stocks Yahoo doesn't cover
    # (Sprint 3). Runs after NSE/BSE publish their bhavcopy files. Silent,
    # best-effort by design -- see bhavcopy.py for the degrade-gracefully
    # logic (missing day just gets skipped, never breaks the workflow).
    if: github.event.schedule == '30 14 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python bhavcopy.py today
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  bhavcopy-backfill:
    # ONE-TIME job: fetches ~2 years of history so the weekly EMA system
    # has enough data immediately, instead of building up day-by-day.
    # Manual-trigger ONLY (no schedule) -- run this once, then ignore it.
    # Takes several minutes: it walks every weekday individually.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_backfill == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python bhavcopy.py backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
