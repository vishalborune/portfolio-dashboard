name: Portfolio Alerts

on:
  schedule:
    # Times are UTC. IST = UTC+5:30. Market hours: 09:15-15:30 IST Mon-Fri.
    - cron: "45 3,4,5,6,7,8,9 * * 1-5"   # states: hourly-ish during market hours
    - cron: "45 4,6,8,10,12,14,16 * * 1-5"  # filings: every 2h, 10:15-22:15 IST (catches evening results filings)
    - cron: "30 3 * * 1"                  # calendar: Monday morning IST
    - cron: "30 15 * * 5"                 # digest: Friday 21:00 IST -- after the
                                          # 20:00/20:30 data jobs, so it computes on
                                          # tonight's closes; Lakshmi plans Saturdays
    - cron: "30 14 * * 1-5"               # bhavcopy: 20:00 IST, after NSE/BSE publish EOD files
    - cron: "0 15 * * 1-5"                # exit audit: 20:30 IST, after bhavcopy so SME prices exist
    - cron: "*/15 3-9 * * 1-5"            # fast-poll: LIVE mainboard entry/add alerts (~1 min), market hours
    - cron: "50 14 * * 1-5"               # eod-entries: SME + final mainboard entry pass, 20:20 IST (after bhavcopy)
  workflow_dispatch:                       # manual run button
    inputs:
      run_backfill:
        description: "Also run the one-time bhavcopy backfill (~2yr history)?"
        type: boolean
        default: false
      run_delivery_backfill:
        description: "Also run the one-time delivery % backfill (~6 weeks)?"
        type: boolean
        default: false
      send_digest_now:
        description: "Send the Sunday digest right now?"
        type: boolean
        default: false
      run_filings_now:
        description: "Check filings right now (tests the AI summaries)?"
        type: boolean
        default: false
      run_index_backfill:
        description: "Backfill the Nifty Smallcap 100 index history (~20 min)?"
        type: boolean
        default: false
      run_symbol_check:
        description: "Diagnostic: test all tracked symbols against the last trading day's NSE/BSE files (2 min)?"
        type: boolean
        default: false
      run_fast_poll_now:
        description: "Run the LIVE entry poller now (~16 min loop)?"
        type: boolean
        default: false

jobs:
  states:
    if: github.event.schedule == '45 3,4,5,6,7,8,9 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py states
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  fast-poll:
    # LIVE mainboard entry/add-zone poller (~1-min latency, Lakshmi 21-Jul-2026).
    # Fires every 15 min in market hours; each run loops ~16 min so coverage is
    # continuous and a crash self-heals on the next tick. Manual runs only start
    # it if the tick-box is set (so a normal dispatch doesn't hang for 16 min).
    if: github.event.schedule == '*/15 3-9 * * 1-5' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_fast_poll_now == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py fast-poll 16 60
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  eod-entries:
    # Evening entry/add pass after the 20:00 bhavcopy stores today's SME closes.
    # The ONLY entry check for SME names (EOD data is fine per Lakshmi) + a final
    # mainboard pass. 20:20 IST. Also runs on a manual dispatch (quick, harmless).
    if: github.event.schedule == '50 14 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py eod-entries
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  filings:
    # Runs on the two trading-day crons, OR when manually requested with
    # the tick-box (manual Run workflow otherwise SKIPS this job -- same
    # gap the digest button closed). Safe to re-run: the filings_seen
    # fingerprint table means already-alerted filings stay silent.
    if: github.event.schedule == '45 4,6,8,10,12,14,16 * * 1-5' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_filings_now == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py filings
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # filing summaries (optional)

  calendar:
    if: github.event.schedule == '30 3 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py calendar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  digest:
    # Runs on the Friday 21:00 IST cron, OR when manually triggered with the
    # "Send the Sunday digest right now?" tick-box (GitHub sometimes drops
    # scheduled runs entirely -- this is the recovery button for that).
    if: github.event.schedule == '30 15 * * 5' || (github.event_name == 'workflow_dispatch' && github.event.inputs.send_digest_now == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAILS: ${{ secrets.DIGEST_EMAILS }}

  bhavcopy:
    # Daily EOD price pull for the 6 SME/Emerge stocks Yahoo doesn't cover
    # (Sprint 3). Runs after NSE/BSE publish their bhavcopy files. Silent,
    # best-effort by design -- see bhavcopy.py for the degrade-gracefully
    # logic (missing day just gets skipped, never breaks the workflow).
    if: github.event.schedule == '30 14 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python bhavcopy.py today
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      # Delivery % (Sprint 3 fast-follow) — same 20:00 IST slot, NSE
      # publishes the delivery file by early evening. Best-effort by
      # design: a blocked/missing day is skipped, never fails the job.
      - run: python delivery.py today
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      # Fundamentals (added 15-Jul-2026): Market Cap/PE/P-B from screener.in,
      # once daily. Replaces live Yahoo .info calls, which got wholesale
      # blocked from this IP under today's load. Best-effort: a failed or
      # unreachable stock is skipped, never fails the job.
      - run: python fundamentals.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  delivery-backfill:
    # ONE-TIME job: ~6 weeks of delivery history so the 4-week rolling
    # average is meaningful immediately. Manual-trigger only, like the
    # bhavcopy backfill. Run once, then ignore.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_delivery_backfill == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python delivery.py backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  symbol-check:
    # 2-minute diagnostic: fetches the last completed trading day's real
    # exchange files and prints FOUND/NOT FOUND for every tracked ticker,
    # plus forensic detail on any fetch failure. The cheap answer before
    # any expensive backfill.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_symbol_check == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python bhavcopy.py check

  index-backfill:
    # Fast dedicated benchmark backfill (~2yrs of Nifty Smallcap 100 daily
    # closes from NSE's official index file). ~15-20 min. Run once; the
    # daily 20:00 job keeps it current afterwards.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_index_backfill == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python bhavcopy.py index-backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  bhavcopy-backfill:
    # ONE-TIME job: fetches ~2 years of history so the weekly EMA system
    # has enough data immediately, instead of building up day-by-day.
    # Manual-trigger ONLY (no schedule) -- run this once, then ignore it.
    # Takes several minutes: it walks every weekday individually.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_backfill == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python bhavcopy.py backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  audit:
    # Sprint 3: 30/60/90-day exit audits. Checks the trade_journal for
    # matured windows, fills in what the stock did after each sell, and
    # sends one Telegram summary when anything completed. Idempotent and
    # silent when nothing matured -- exits are rare, most runs do nothing.
    # Scheduled AFTER bhavcopy (20:30 IST) so SME closes for the day exist.
    # Also runs on manual dispatch so the first journal entry can be tested.
    if: github.event.schedule == '0 15 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python exit_audit.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
