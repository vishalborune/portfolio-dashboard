name: Portfolio Alerts

on:
  schedule:
    # Times are UTC. IST = UTC+5:30. Market hours: 09:15-15:30 IST Mon-Fri.
    - cron: "45 3,4,5,6,7,8,9 * * 1-5"   # states: hourly-ish during market hours
    - cron: "15 5,9 * * 1-5"              # filings: twice on trading days
    - cron: "30 3 * * 1"                  # calendar: Monday morning IST
    - cron: "30 4 * * 0"                  # digest: Sunday 10:00 IST
    - cron: "30 14 * * 1-5"               # bhavcopy: 20:00 IST, after NSE/BSE publish EOD files
    - cron: "0 15 * * 1-5"                # exit audit: 20:30 IST, after bhavcopy so SME prices exist
  workflow_dispatch:                       # manual run button
    inputs:
      run_backfill:
        description: "Also run the one-time bhavcopy backfill (~2yr history)?"
        type: boolean
        default: false
      run_delivery_backfill:
        description: "Also run the one-time delivery % backfill (~6 weeks)?"
        type: boolean
        default: false
      send_digest_now:
        description: "Send the Sunday digest right now?"
        type: boolean
        default: false

jobs:
  states:
    if: github.event.schedule == '45 3,4,5,6,7,8,9 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py states
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  filings:
    if: github.event.schedule == '15 5,9 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py filings
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  calendar:
    if: github.event.schedule == '30 3 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py calendar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  digest:
    # Runs on the Sunday 10:00 IST cron, OR when manually triggered with the
    # "Send the Sunday digest right now?" tick-box (GitHub sometimes drops
    # scheduled runs entirely -- this is the recovery button for that).
    if: github.event.schedule == '30 4 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.send_digest_now == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python alerts.py digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAILS: ${{ secrets.DIGEST_EMAILS }}

  bhavcopy:
    # Daily EOD price pull for the 6 SME/Emerge stocks Yahoo doesn't cover
    # (Sprint 3). Runs after NSE/BSE publish their bhavcopy files. Silent,
    # best-effort by design -- see bhavcopy.py for the degrade-gracefully
    # logic (missing day just gets skipped, never breaks the workflow).
    if: github.event.schedule == '30 14 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python bhavcopy.py today
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      # Delivery % (Sprint 3 fast-follow) — same 20:00 IST slot, NSE
      # publishes the delivery file by early evening. Best-effort by
      # design: a blocked/missing day is skipped, never fails the job.
      - run: python delivery.py today
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      # Fundamentals (added 15-Jul-2026): Market Cap/PE/P-B from screener.in,
      # once daily. Replaces live Yahoo .info calls, which got wholesale
      # blocked from this IP under today's load. Best-effort: a failed or
      # unreachable stock is skipped, never fails the job.
      - run: python fundamentals.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  delivery-backfill:
    # ONE-TIME job: ~6 weeks of delivery history so the 4-week rolling
    # average is meaningful immediately. Manual-trigger only, like the
    # bhavcopy backfill. Run once, then ignore.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_delivery_backfill == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python delivery.py backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  bhavcopy-backfill:
    # ONE-TIME job: fetches ~2 years of history so the weekly EMA system
    # has enough data immediately, instead of building up day-by-day.
    # Manual-trigger ONLY (no schedule) -- run this once, then ignore it.
    # Takes several minutes: it walks every weekday individually.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_backfill == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python bhavcopy.py backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  audit:
    # Sprint 3: 30/60/90-day exit audits. Checks the trade_journal for
    # matured windows, fills in what the stock did after each sell, and
    # sends one Telegram summary when anything completed. Idempotent and
    # silent when nothing matured -- exits are rare, most runs do nothing.
    # Scheduled AFTER bhavcopy (20:30 IST) so SME closes for the day exist.
    # Also runs on manual dispatch so the first journal entry can be tested.
    if: github.event.schedule == '0 15 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python exit_audit.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
